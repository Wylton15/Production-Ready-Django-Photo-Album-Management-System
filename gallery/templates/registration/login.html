{% extends "gallery/base.html" %}
{% block title %}Login – PhotoVault{% endblock %}

{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center;">
    <div style="width:100%; max-width:440px;">
        <div style="text-align:center; margin-bottom:2rem;">
            <div style="font-size:3rem; margin-bottom:0.5rem;">📷</div>
            <h1 class="section-title">Welcome <span>Back</span></h1>
            <p style="color:var(--text-m);">Sign in to manage your photo albums</p>
        </div>

        <div class="form-card">
            <form method="POST" id="login-form">
                {% csrf_token %}
                {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

                <div class="form-group">
                    <label for="id_login_username">Username</label>
                    <input type="text" name="username" id="id_login_username"
                           class="form-control" placeholder="Your username"
                           value="{{ username_value|default:'' }}" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="id_login_password">Password</label>
                    <input type="password" name="password" id="id_login_password"
                           class="form-control" placeholder="Your password"
                           autocomplete="current-password" required>
                </div>

                <div class="form-actions" style="flex-direction:column; gap:0.75rem;">
                    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;" id="login-submit-btn">
                        🔐 Sign In
                    </button>
                    <a href="{% url 'register' %}" class="btn btn-ghost" style="width:100%; justify-content:center; text-align:center;" id="login-register-link">
                        Don't have an account? Register
                    </a>
                </div>
            </form>
        </div>

        <p style="text-align:center; margin-top:1.5rem; font-size:0.82rem; color:var(--text-d);">
            Admin access? Use <a href="/admin/" style="color:var(--primary);">Django Admin</a>
        </p>
    </div>
</div>
{% endblock %}
